<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Arquitectura y despliegue Miller</title>
  <desc id="desc">Diagrama explicativo del despliegue en Vercel con Next.js, Prisma y PostgreSQL.</desc>
  <rect width="1200" height="760" fill="#f4f7fb"/>
  <text x="60" y="70" fill="#102033" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">Arquitectura y despliegue Miller</text>
  <text x="60" y="108" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="18">Explicacion coloquial y tecnica del flujo actual y la evolucion hacia base de datos.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1c5d99"/>
    </marker>
    <style>
      .box { fill: #ffffff; stroke: #d9e2ef; stroke-width: 2; }
      .future { fill: #eef4ff; stroke: #1c5d99; stroke-width: 2; }
      .temp { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 8 8; }
      .title { fill: #102033; font: 700 20px "Segoe UI", Arial, sans-serif; }
      .body { fill: #64748b; font: 15px "Segoe UI", Arial, sans-serif; }
      .small { fill: #64748b; font: 13px "Segoe UI", Arial, sans-serif; }
      .arrow { stroke: #1c5d99; stroke-width: 3; marker-end: url(#arrow); }
      .soft { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 8 8; marker-end: url(#arrow); fill: none; }
    </style>
  </defs>

  <rect class="box" x="60" y="170" width="190" height="120" rx="18"/>
  <text class="title" x="155" y="215" text-anchor="middle">Usuario</text>
  <text class="body" x="155" y="245" text-anchor="middle">Navegador / tablet</text>
  <text class="small" x="155" y="270" text-anchor="middle">Llena formularios</text>

  <line class="arrow" x1="250" y1="230" x2="330" y2="230"/>

  <rect class="future" x="330" y="170" width="200" height="120" rx="18"/>
  <text class="title" x="430" y="215" text-anchor="middle">Vercel</text>
  <text class="body" x="430" y="245" text-anchor="middle">Publica la app</text>
  <text class="small" x="430" y="270" text-anchor="middle">Hosting + serverless</text>

  <line class="arrow" x1="530" y1="230" x2="610" y2="230"/>

  <rect class="box" x="610" y="170" width="220" height="120" rx="18"/>
  <text class="title" x="720" y="215" text-anchor="middle">Next.js</text>
  <text class="body" x="720" y="245" text-anchor="middle">Pantallas + API</text>
  <text class="small" x="720" y="270" text-anchor="middle">Reglas de negocio</text>

  <line class="arrow" x1="720" y1="290" x2="720" y2="370"/>

  <rect class="future" x="610" y="370" width="220" height="120" rx="18"/>
  <text class="title" x="720" y="415" text-anchor="middle">Prisma ORM</text>
  <text class="body" x="720" y="445" text-anchor="middle">Traduce a SQL</text>
  <text class="small" x="720" y="470" text-anchor="middle">Modelos y migraciones</text>

  <line class="arrow" x1="830" y1="430" x2="910" y2="430"/>

  <rect class="future" x="910" y="370" width="220" height="120" rx="18"/>
  <text class="title" x="1020" y="415" text-anchor="middle">PostgreSQL</text>
  <text class="body" x="1020" y="445" text-anchor="middle">Datos reales</text>
  <text class="small" x="1020" y="470" text-anchor="middle">Historial y auditoria</text>

  <path class="soft" d="M610 265 C520 330, 480 360, 430 390"/>
  <rect class="temp" x="330" y="370" width="200" height="120" rx="18"/>
  <text class="title" x="430" y="415" text-anchor="middle">localStorage</text>
  <text class="body" x="430" y="445" text-anchor="middle">Temporal hoy</text>
  <text class="small" x="430" y="470" text-anchor="middle">Solo en navegador</text>

  <rect x="60" y="560" width="1070" height="120" rx="18" fill="#ffffff" stroke="#d9e2ef" stroke-width="2"/>
  <text class="title" x="90" y="605">Como explicarlo en sencillo</text>
  <text class="body" x="90" y="638">Vercel publica la aplicacion. Next.js muestra las pantallas y recibe los formularios.</text>
  <text class="body" x="90" y="665">Prisma actua como traductor entre la app y PostgreSQL. PostgreSQL guarda el historial confiable de la operacion.</text>
</svg>
